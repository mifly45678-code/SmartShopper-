<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART SHOPPER - Online Shopping Group</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-theme">

    <header>
        <div class="navbar">
            <div class="logo-area">
                <div class="logo-placeholder">
                    <i class="fa-solid fa-lightbulb" style="color: #f59e0b;"></i>
                    <i class="fa-solid fa-bag-shopping" style="color: #14b8a6;"></i>
                </div>
                <div class="logo-text">
                    <span class="sub-logo">ONLINE SHOPPING GROUP</span>
                    <h1 class="main-logo">SMART SHOPPER</h1>
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Search for products, brands...">
                <button type="button"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="nav-actions">
                <button id="theme-toggle-btn" onclick="toggleTheme()">
                    <i id="theme-icon" class="fa-solid fa-moon"></i> Dark Mode
                </button>
                <a href="#order-section" class="cart-btn"><i class="fa-solid fa-cart-shopping"></i> Checkout</a>
            </div>
        </div>
    </header>

    <main>
        <section class="hero-banner">
            <h2>Smart Shopping, Better Living!</h2>
            <p>Explore millions of wholesale products directly from manufacturers.</p>
        </section>

        <section class="products-section">
            <h3>Trending Products</h3>
            <div class="products-grid" id="productsDisplay">
                </div>
        </section>

        <section id="order-section" class="order-form-container">
            <h3>Place Your Order</h3>
            <form id="customerOrderForm" onsubmit="handleOrderSubmit(event)">
                <div class="form-group">
                    <label for="custName">Full Name</label>
                    <input type="text" id="custName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="custAddress">Delivery Address</label>
                    <textarea id="custAddress" rows="3" required placeholder="Enter your complete shipping address"></textarea>
                </div>
                <div class="form-group">
                    <label for="custPhone">Phone Number</label>
                    <input type="tel" id="custPhone" required placeholder="e.g. +94 77 XXXXXXX">
                </div>
                <div class="form-group">
                    <label for="productSelect">Select Product ID</label>
                    <input type="text" id="productSelect" required placeholder="Enter the Product ID you want to buy">
                </div>
                <button type="submit" class="submit-order-btn">Submit Order to Admin</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 SMART SHOPPER Group. All Rights Reserved.</p>
    </footer>

    <script src="customer.js"></script>
</body>
</html>
