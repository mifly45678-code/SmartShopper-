<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART SHOPPER - Secured Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Special styles to protect Admin view */
        #admin-main-content { display: none; }
        .login-box { max-width: 400px; margin: 100px auto; padding: 30px; background: #fff; box-shadow: 0px 0px 15px rgba(0,0,0,0.1); border-radius: 8px; text-align: center; }
    </style>
</head>
<body class="light-theme">

    <div id="admin-login" class="login-box">
        <h2><i class="fa-solid fa-lock"></i> Admin Access Only</h2>
        <p>Please enter your secret password to manage Smart Shopper.</p>
        <input type="password" id="adminPass" placeholder="Enter Password" style="width:90%; padding:10px; margin:15px 0;">
        <button onclick="checkAdminPassword()" style="background:#1a9391; color:white; padding:10px 20px; border:none; cursor:pointer;">Access Dashboard</button>
    </div>

    <div id="admin-main-content">
        <header style="background: #112233; color: white; padding: 15px;">
            <h2><i class="fa-solid fa-gauge"></i> SMART SHOPPER Control Centre (Admin)</h2>
            <button onclick="logoutAdmin()" style="float: right; margin-top: -35px; background: red; color: white; border: none; padding: 5px 10px; cursor: pointer;">Secure Logout</button>
        </header>

        <main style="padding: 20px; max-width: 1200px; margin: auto;">
            <section class="admin-section" style="background: #f4f6f9; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
                <h3><i class="fa-solid fa-plus"></i> Upload New Product (AliExpress Style)</h3>
                <form id="uploadProductForm" onsubmit="adminAddProduct(event)">
                    <input type="text" id="prodName" placeholder="Product Title" required style="width: 23%; padding: 8px; margin-right: 1%;">
                    <input type="number" id="prodPrice" placeholder="Price ($)" required style="width: 15%; padding: 8px; margin-right: 1%;">
                    <input type="text" id="prodImg" placeholder="Image URL (e.g. https://...)" style="width: 25%; padding: 8px; margin-right: 1%;">
                    <input type="text" id="prodDesc" placeholder="Brief Description" style="width: 20%; padding: 8px; margin-right: 1%;">
                    <button type="submit" style="background: #1a9391; color: white; padding: 9px 15px; border: none; cursor: pointer;">Upload Item</button>
                </form>
            </section>

            <section class="admin-section">
                <h3><i class="fa-solid fa-boxes-shopping"></i> Live Customer Orders Database</h3>
                <div style="overflow-x:auto;">
                    <table id="ordersTable" border="1" style="width:100%; border-collapse: collapse; text-align: left; margin-top: 15px;">
                        <thead style="background: #2a3b4c; color: white;">
                            <tr>
                                <th style="padding: 10px;">Order ID</th>
                                <th style="padding: 10px;">Customer Name</th>
                                <th style="padding: 10px;">Address</th>
                                <th style="padding: 10px;">Phone</th>
                                <th style="padding: 10px;">Product ID</th>
                                <th style="padding: 10px;">Date</th>
                                <th style="padding: 10px;">Status / Actions</th>
                            </tr>
                        </thead>
                        <tbody id="adminOrdersDisplay">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
